<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Tow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="upperBox">
        <h1 >Tic Tac Tow</h1>
        <button id="reset">Reset</button>
        
        <dialog id="dialog">
            <form method="dialog" id="form">
                <label for=""> player name with 'X'</label>
                <input type="text" name="playerWithX" id="playerWithX">
                <label for=""> player name with 'O'</label>
                <input type="text" name="playerWithO" id="playerWithO">
                <button type="reset">Reset</button>
                <button type="submit">Submit</button>
                <button type="button" id="closebtn">close</button>
            </form>
        </dialog>

        <div id="gameDisplay">
            <div class="gameGrid" id="0"></div>
            <div class="gameGrid" id='1'>O</div>
            <div class="gameGrid" id="2">X</div>
            <div class="gameGrid" id="3">X</div>
            <div class="gameGrid" id="4">O</div>
            <div class="gameGrid" id="5"></div>
            <div class="gameGrid" id="6"></div>
            <div class="gameGrid" id="7"></div>
            <div class="gameGrid" id="8"></div>
        </div>
        <div id="result"></div>
    </div>


    <script src="script.js"></script>
</body>
</html>
