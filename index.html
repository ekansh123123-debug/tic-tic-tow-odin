<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Tow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="upperBox">
        <h1 >Tic Tac Tow</h1>
        <button id="reset">Reset</button>

        <div id="gameDisplay">
            <div class="gameGrid" id="0"></div>
            <div class="gameGrid" id='1'>O</div>
            <div class="gameGrid" id="2">X</div>
            <div class="gameGrid" id="3">X</div>
            <div class="gameGrid" id="4">O</div>
            <div class="gameGrid" id="5"></div>
            <div class="gameGrid" id="6"></div>
            <div class="gameGrid" id="7"></div>
            <div class="gameGrid" id="8"></div>
        </div>
        <div id="result"></div>
    </div>


    <script src="script.js"></script>
</body>
</html>
